<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; margin:0; background:#f4f4f4; }

header {
    background:linear-gradient(to right,orange,red);
    color:white;
    text-align:center;
    padding:20px;
}

.container { max-width:500px; margin:auto; padding:10px; }

.card {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

img { width:100%; border-radius:10px; }

.btn {
    background:green;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    margin-top:10px;
    width:100%;
}

.qty { display:flex; justify-content:center; gap:10px; margin-top:10px; }

.qty button { padding:5px 10px; }

input { width:100%; padding:10px; margin:5px 0; }

.footer { text-align:center; background:black; color:white; padding:10px; }
</style>
</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Pickles | Sweets | Snacks</p>
</header>

<div class="container">

<!-- PRODUCT 1 -->
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>

<div class="qty">
<button onclick="changeQty('pickle',-1)">-</button>
<span id="qty_pickle">0</span>
<button onclick="changeQty('pickle',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Mango Pickle',600,'pickle')">Add to Cart</button>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('laddu',-1)">-</button>
<span id="qty_laddu">0</span>
<button onclick="changeQty('laddu',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Laddu',400,'laddu')">Add to Cart</button>
</div>

<!-- PRODUCT 3 -->
<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('snacks',-1)">-</button>
<span id="qty_snacks">0</span>
<button onclick="changeQty('snacks',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Murukulu',400,'snacks')">Add to Cart</button>
</div>

<!-- CART -->
<div class="card">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>
</div>

<!-- ORDER -->
<div class="card">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button class="btn" onclick="sendOrder()">Place Order</button>
</div>

</div>

<div class="footer">
📞 9848305086
</div>

<script>

let cart = [];

/* CHANGE QTY */
function changeQty(id,val){
    let el = document.getElementById("qty_"+id);
    let qty = parseInt(el.innerText) + val;
    if(qty<0) qty=0;
    el.innerText = qty;
}

/* ADD TO CART */
function addToCart(name, price, id){

    let qty = parseInt(document.getElementById("qty_"+id).innerText);

    if(qty === 0){
        alert("Select quantity");
        return;
    }

    cart.push({name, price, qty});
    displayCart();
}

/* DISPLAY */
function displayCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        list.innerHTML += `<li>${item.name} x ${item.qty} = ₹${itemTotal}</li>`;
    });

    document.getElementById("total").innerText = total;
}

/* SEND ORDER */
function sendOrder(){

    if(cart.length === 0){
        alert("Cart empty");
        return;
    }

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    let msg = "🛒 Order%0A%0A";
    msg += "Name: "+name+"%0A";
    msg += "Phone: "+phone+"%0A";
    msg += "Address: "+address+"%0A%0A";

    cart.forEach(item=>{
        msg += item.name+" x "+item.qty+" = ₹"+(item.price*item.qty)+"%0A";
    });

    window.open("https://api.whatsapp.com/send?phone=919848305086&text="+msg);

    cart = [];
    displayCart();
    document.querySelectorAll("input").forEach(i=>i.value="");
}

</script>

</body>
</html>
