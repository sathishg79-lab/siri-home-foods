<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: linear-gradient(to right, #ff7a00, #ff2e00);
    color: white;
    padding: 25px;
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

/* CATEGORY */
.category-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
}

.category-bar button {
    background: #ff9800;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
}

img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: green;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 8px;
    width: 100%;
    margin-top: 10px;
    font-size: 16px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* CART */
.cart ul {
    text-align: left;
    padding-left: 20px;
}

/* FOOTER */
.footer {
    text-align: center;
    background: black;
    color: white;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Fresh • Healthy • Homemade</p>
</header>

<div class="container">

<!-- CATEGORY -->
<div class="category-bar">
<button onclick="showCategory('pickles')">Pickles</button>
<button onclick="showCategory('sweets')">Sweets</button>
<button onclick="showCategory('snacks')">Snacks</button>
</div>

<!-- ITEMS -->
<div id="pickles" class="category">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>
<button class="btn" onclick="addToCart('Mango Pickle',600)">Add to Cart</button>
</div>
</div>

<div id="sweets" class="category" style="display:none;">
<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>
<button class="btn" onclick="addToCart('Laddu',400)">Add to Cart</button>
</div>
</div>

<div id="snacks" class="category" style="display:none;">
<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>
<button class="btn" onclick="addToCart('Murukulu',400)">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="card cart">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>
</div>

<!-- ORDER -->
<div class="card">
<h3>Place Order</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">

<button class="btn" onclick="sendOrder()">Place Order</button>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Payment</h3>
<a class="btn" href="upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&cu=INR">
Pay via UPI
</a>
</div>

<!-- LOCATION -->
<div class="card">
<h3>📍 Location</h3>

<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&z=17&output=embed"
width="100%" height="200" style="border:0;">
</iframe>

<a class="btn" 
href="https://maps.google.com/?q=17.4064993,78.5987009" 
target="_blank">
Open in Google Maps
</a>
</div>

</div>

<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/919848305086" 
style="position:fixed; bottom:20px; right:20px; background:#25D366; color:white; padding:15px; border-radius:50%;">
💬
</a>

<script>

let cart = [];

/* CATEGORY SWITCH */
function showCategory(cat) {
    document.querySelectorAll(".category").forEach(c => c.style.display = "none");
    document.getElementById(cat).style.display = "block";
}

/* ADD CART */
function addToCart(name, price) {
    cart.push({name, price});
    displayCart();
}

/* DISPLAY CART */
function displayCart() {
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach((item, i) => {
        total += item.price;

        list.innerHTML += "<li>" + item.name + " - ₹" + item.price +
        " <button onclick='removeItem("+i+")'>❌</button></li>";
    });

    document.getElementById("total").innerText = total;
}

/* REMOVE */
function removeItem(i) {
    cart.splice(i,1);
    displayCart();
}

/* SEND ORDER */
function sendOrder() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if(cart.length === 0){
        alert("Cart empty");
        return;
    }

    let msg = "🛒 Siri Home Foods Order%0A%0A";
    msg += "Name: " + name + "%0A";
    msg += "Phone: " + phone + "%0A%0A";

    cart.forEach(item => {
        msg += item.name + " - ₹" + item.price + "%0A";
    });

    let url = "https://wa.me/919848305086?text=" + msg;

    window.location.href = url;   // 🔥 mobile-friendly redirect

    /* CLEAR FORM */
    cart = [];
    displayCart();
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
}

</script>

</body>
</html>
