<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f2f2f2;
}

/* HEADER */
header {
    background: linear-gradient(to right, orange, red);
    color: white;
    padding: 25px;
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

/* CATEGORY BUTTONS */
.category-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 15px;
}

.category-bar button {
    padding: 8px 15px;
    border: none;
    background: orange;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* GRID */
.category {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

/* IMAGE */
img {
    width: 100%;
    max-height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: green;
    color: white;
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

/* CART */
.cart {
    background: white;
    padding: 15px;
    margin-top: 20px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

.cart ul {
    padding-left: 20px;
}

.cart button {
    margin-left: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    background: black;
    color: white;
    margin-top: 20px;
}
</style>

</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Fresh • Healthy • Homemade</p>
</header>

<div class="container">

<!-- CATEGORY -->
<div class="category-bar">
<button onclick="showCategory('pickles')">Pickles</button>
<button onclick="showCategory('sweets')">Sweets</button>
<button onclick="showCategory('snacks')">Snacks</button>
</div>

<!-- PICKLES -->
<div id="pickles" class="category">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>
<button class="btn" onclick="addToCart('Mango Pickle',600)">Add to Cart</button>
</div>
</div>

<!-- SWEETS -->
<div id="sweets" class="category" style="display:none;">
<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>
<button class="btn" onclick="addToCart('Laddu',400)">Add to Cart</button>
</div>
</div>

<!-- SNACKS -->
<div id="snacks" class="category" style="display:none;">
<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>
<button class="btn" onclick="addToCart('Murukulu',400)">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>

<button class="btn" onclick="sendCart()">Order via WhatsApp</button>
</div>

</div>

<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/919848305086" 
style="position:fixed; bottom:20px; right:20px; background:green; color:white; padding:15px; border-radius:50%;">
💬
</a>

<script>

let cart = [];

/* CATEGORY SWITCH */
function showCategory(cat) {
    document.querySelectorAll(".category").forEach(c => c.style.display = "none");
    document.getElementById(cat).style.display = "grid";
}

/* ADD TO CART */
function addToCart(name, price) {
    cart.push({name, price});
    displayCart();
}

/* DISPLAY CART */
function displayCart() {
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price;

        let li = document.createElement("li");
        li.innerHTML = item.name + " - ₹" + item.price +
        " <button onclick='removeItem("+index+")'>❌</button>";

        list.appendChild(li);
    });

    document.getElementById("total").innerText = total;
}

/* REMOVE ITEM */
function removeItem(index) {
    cart.splice(index,1);
    displayCart();
}

/* WHATSAPP ORDER */
function sendCart() {
    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    let message = "🛒 Siri Home Foods Order%0A%0A";

    cart.forEach(item => {
        message += item.name + " - ₹" + item.price + "%0A";
    });

    window.open("https://wa.me/919848305086?text=" + message, "_blank");

    cart = [];
    displayCart();
}

</script>

</body>
</html>
