<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }

header {
    background:linear-gradient(to right,orange,red);
    color:white;
    text-align:center;
    padding:20px;
}

.container { max-width:500px; margin:auto; padding:10px; }

/* MENU */
.menu {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px 0;
}

.menu button {
    background:orange;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    color:white;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

img { width:100%; border-radius:10px; }

.btn {
    background:green;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    width:100%;
    margin-top:10px;
}

/* QTY */
.qty {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.qty button { padding:5px 10px; }

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:5px 0;
}

/* FOOTER */
.footer {
    text-align:center;
    background:black;
    color:white;
    padding:10px;
}
</style>

</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Pickles | Sweets | Snacks</p>
</header>

<div class="container">

<!-- MENU -->
<div class="menu">
<button onclick="showMenu('pickles')">Pickles</button>
<button onclick="showMenu('sweets')">Sweets</button>
<button onclick="showMenu('snacks')">Snacks</button>
</div>

<!-- PICKLES -->
<div id="pickles">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>

<div class="qty">
<button onclick="changeQty('p1',-1)">-</button>
<span id="qty_p1">0</span>
<button onclick="changeQty('p1',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Mango Pickle',600,'p1')">Add to Cart</button>
</div>
</div>

<!-- SWEETS -->
<div id="sweets" style="display:none;">
<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('s1',-1)">-</button>
<span id="qty_s1">0</span>
<button onclick="changeQty('s1',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Laddu',400,'s1')">Add to Cart</button>
</div>
</div>

<!-- SNACKS -->
<div id="snacks" style="display:none;">
<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('n1',-1)">-</button>
<span id="qty_n1">0</span>
<button onclick="changeQty('n1',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Murukulu',400,'n1')">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="card">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>
</div>

<!-- ADDRESS -->
<div class="card">
<h3>Delivery Details</h3>
<input id="name" placeholder="Your Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">

<button class="btn" onclick="previewOrder()">Preview Order</button>
</div>

<!-- SUMMARY -->
<div class="card" id="summaryBox" style="display:none;">
<h3>Order Summary</h3>
<div id="summary"></div>
<button class="btn" onclick="sendOrder()">Confirm Order</button>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Payment</h3>
<a id="upiLink" class="btn">Pay via UPI</a>
</div>

<!-- MAP -->
<div class="card">
<h3>📍 Location</h3>

<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&z=17&output=embed"
width="100%" height="200" style="border:0;">
</iframe>

<a class="btn" 
href="https://maps.google.com/?q=17.4064993,78.5987009" 
target="_blank">
Open in Google Maps
</a>

</div>

</div>

<div class="footer">
📞 9848305086
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://api.whatsapp.com/send?phone=919848305086"
style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;">
💬
</a>

<script>

let cart = [];

/* MENU */
function showMenu(menu){
    document.getElementById("pickles").style.display="none";
    document.getElementById("sweets").style.display="none";
    document.getElementById("snacks").style.display="none";
    document.getElementById(menu).style.display="block";
}

/* QTY */
function changeQty(id,val){
    let el = document.getElementById("qty_"+id);
    let qty = parseInt(el.innerText) + val;
    if(qty<0) qty=0;
    el.innerText = qty;
}

/* ADD CART */
function addToCart(name, price, id){
    let qty = parseInt(document.getElementById("qty_"+id).innerText);

    if(qty === 0){
        alert("Select quantity");
        return;
    }

    cart.push({name, price, qty});
    displayCart();
}

/* DISPLAY */
function displayCart(){
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach(item=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        list.innerHTML += `<li>${item.name} x ${item.qty} = ₹${itemTotal}</li>`;
    });

    document.getElementById("total").innerText = total;
}

/* PREVIEW */
function previewOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Fill all details");
        return;
    }

    if(cart.length === 0){
        alert("Cart empty");
        return;
    }

    let summary = "";
    let total = 0;

    cart.forEach(item=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;
        summary += `${item.name} x ${item.qty} = ₹${itemTotal}<br>`;
    });

    summary += `<br><b>Total: ₹${total}</b>`;

    document.getElementById("summary").innerHTML = summary;
    document.getElementById("summaryBox").style.display="block";

    document.getElementById("upiLink").href =
    "upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&am="+total+"&cu=INR";
}

/* SEND */
function sendOrder(){

    let msg = "🛒 Order%0A%0A";

    cart.forEach(item=>{
        msg += item.name+" x "+item.qty+" = ₹"+(item.price*item.qty)+"%0A";
    });

    window.open("https://api.whatsapp.com/send?phone=919848305086&text="+msg);

    cart = [];
    displayCart();
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.getElementById("summaryBox").style.display="none";
}

</script>

</body>
</html>
