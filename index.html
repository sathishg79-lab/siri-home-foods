<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(to right, orange, red);
    color: white;
    padding: 20px;
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 600px;
    margin: auto;
    padding: 10px;
}

/* CATEGORY BUTTONS */
.category-bar {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 10px;
}

.category-bar button {
    padding: 10px 15px;
    border: none;
    background: orange;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

/* GRID */
.category {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 6px gray;
}

img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: green;
    color: white;
    padding: 10px;
    margin-top: 5px;
    display: block;
    text-decoration: none;
    border-radius: 5px;
    cursor: pointer;
}

/* CART */
.cart {
    background: white;
    padding: 10px;
    margin-top: 20px;
    border-radius: 10px;
}

/* FOOTER */
.footer {
    text-align: center;
    background: black;
    color: white;
    padding: 15px;
    margin-top: 20px;
}
</style>

</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Fresh • Healthy • Homemade</p>
</header>

<div class="container">

<!-- CATEGORY -->
<div class="category-bar">
<button onclick="showCategory('pickles')">Pickles</button>
<button onclick="showCategory('sweets')">Sweets</button>
<button onclick="showCategory('snacks')">Snacks</button>
</div>

<!-- PICKLES -->
<div id="pickles" class="category">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>
<button class="btn" onclick="addToCart('Mango Pickle',600)">Add to Cart</button>
</div>
</div>

<!-- SWEETS -->
<div id="sweets" class="category" style="display:none;">
<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>
<button class="btn" onclick="addToCart('Laddu',400)">Add to Cart</button>
</div>
</div>

<!-- SNACKS -->
<div id="snacks" class="category" style="display:none;">
<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>
<button class="btn" onclick="addToCart('Murukulu',400)">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="cart">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>

<button class="btn" onclick="sendCart()">Order via WhatsApp</button>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Pay Now</h3>
<a class="btn" href="upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&cu=INR">
Pay via UPI
</a>
</div>

<!-- LOCATION -->
<div class="card">
<h3>📍 Location</h3>

<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&output=embed"
width="100%" height="200" style="border:0;">
</iframe>

<a class="btn" href="https://www.google.com/maps/place/Chilukuri+nilayam" target="_blank">
Open in Google Maps
</a>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/919848305086" 
style="position:fixed; bottom:20px; right:20px; background:green; color:white; padding:15px; border-radius:50%;">
💬
</a>

<script>

let cart = [];

/* CATEGORY */
function showCategory(cat) {
    let categories = document.querySelectorAll(".category");
    categories.forEach(c => c.style.display = "none");
    document.getElementById(cat).style.display = "grid";
}

/* ADD TO CART */
function addToCart(name, price) {
    cart.push({name, price});
    displayCart();
}

/* DISPLAY CART */
function displayCart() {
    let list = document.getElementById("cartList");
    let total = 0;

    list.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price;

        let li = document.createElement("li");
        li.innerHTML = item.name + " - ₹" + item.price +
        " <button onclick='removeItem("+index+")'>❌</button>";

        list.appendChild(li);
    });

    document.getElementById("total").innerText = total;
}

/* REMOVE */
function removeItem(index) {
    cart.splice(index,1);
    displayCart();
}

/* WHATSAPP ORDER */
function sendCart() {

    if(cart.length === 0){
        alert("Cart is empty");
        return;
    }

    let message = "🛒 *Siri Home Foods Order*%0A%0A";

    cart.forEach(item => {
        message += "• " + item.name + " - ₹" + item.price + "%0A";
    });

    let phone = "919848305086";

    let isMobile = /Android|iPhone/i.test(navigator.userAgent);

    let url = isMobile
        ? "https://wa.me/" + phone + "?text=" + message
        : "https://web.whatsapp.com/send?phone=" + phone + "&text=" + message;

    window.open(url, "_blank");

    cart = [];
    displayCart();
}

</script>

</body>
</html>
