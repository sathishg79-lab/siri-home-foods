<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f4f4f4;
}

header {
    background:linear-gradient(to right,#ff7a00,#ff2e00);
    color:white;
    text-align:center;
    padding:25px;
}

.container {
    max-width:500px;
    margin:auto;
    padding:15px;
}

.category-bar {
    display:flex;
    justify-content:center;
    gap:10px;
}

.category-bar button {
    background:#ff9800;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    color:white;
    font-weight:bold;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    margin-top:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

img {
    width:100%;
    border-radius:10px;
}

/* BUTTON */
.btn {
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    width:100%;
    margin-top:10px;
}

/* QTY */
.qty {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.qty button {
    padding:5px 12px;
}

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:5px 0;
}

/* SUMMARY */
.summary {
    text-align:left;
    background:#fff3cd;
    padding:10px;
    border-radius:10px;
}

.footer {
    text-align:center;
    background:black;
    color:white;
    padding:15px;
    margin-top:20px;
}
</style>

</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Fresh • Healthy • Homemade</p>
</header>

<div class="container">

<!-- CATEGORY -->
<div class="category-bar">
<button onclick="showCategory('pickles')">Pickles</button>
</div>

<!-- PRODUCT -->
<div id="pickles">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>

<div class="qty">
<button onclick="changeQty(-1)">-</button>
<span id="qty">0</span>
<button onclick="changeQty(1)">+</button>
</div>

<button class="btn" onclick="addToCart()">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="card">
<h2>🛒 Cart</h2>
<p id="cart"></p>
<p><b>Total: ₹<span id="total">0</span></b></p>
</div>

<!-- ADDRESS -->
<div class="card">
<h3>Delivery Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">
<button class="btn" onclick="preview()">Preview Order</button>
</div>

<!-- SUMMARY -->
<div class="card" id="summaryBox" style="display:none;">
<h3>Order Summary</h3>
<div id="summary" class="summary"></div>
<button class="btn" onclick="sendOrder()">Confirm Order</button>
</div>

<!-- STATUS -->
<div class="card">
<h3>📦 Order Status</h3>
<p id="status">No Order</p>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Payment</h3>
<a id="upiLink" class="btn">Pay via UPI</a>
</div>

<!-- MAP -->
<div class="card">
<h3>📍 Location</h3>
<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&z=17&output=embed"
width="100%" height="200">
</iframe>
</div>

</div>

<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT -->
<a href="https://wa.me/919848305086"
style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;">
💬
</a>

<script>

let qty = 0;
let price = 600;
let total = 0;

/* QTY */
function changeQty(val){
    qty += val;
    if(qty<0) qty=0;
    document.getElementById("qty").innerText = qty;
}

/* ADD */
function addToCart(){
    total = qty * price;
    document.getElementById("cart").innerText = "Mango Pickle x "+qty;
    document.getElementById("total").innerText = total;
}

/* PREVIEW */
function preview(){
    let name = nameInput();
    let phone = phoneInput();
    let address = addrInput();

    let html = `
    Name: ${name}<br>
    Phone: ${phone}<br>
    Address: ${address}<br><br>
    Mango Pickle x ${qty}<br>
    Total: ₹${total}
    `;

    document.getElementById("summary").innerHTML = html;
    document.getElementById("summaryBox").style.display="block";

    // update UPI amount
    document.getElementById("upiLink").href =
    "upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&am="+total+"&cu=INR";
}

/* SEND */
function sendOrder(){

    let msg = `🧾 Siri Home Foods Order

Name: ${nameInput()}
Phone: ${phoneInput()}
Address: ${addrInput()}

Mango Pickle x ${qty}
Total ₹${total}`;

    let url = "https://api.whatsapp.com/send?phone=919848305086&text="+encodeURIComponent(msg);

    window.open(url,"_blank");

    document.getElementById("status").innerText="Order Sent ✅";

    // reset
    qty=0;
    total=0;
    document.getElementById("qty").innerText=0;
    document.getElementById("cart").innerText="";
    document.getElementById("total").innerText=0;
    document.querySelectorAll("input").forEach(i=>i.value="");
}

/* HELPERS */
function nameInput(){ return document.getElementById("name").value; }
function phoneInput(){ return document.getElementById("phone").value; }
function addrInput(){ return document.getElementById("address").value; }

</script>

</body>
</html>
