<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:'Segoe UI'; background:#f5f5f5; }

header {
    background:linear-gradient(to right,#ff7a00,#ff2e00);
    color:white;
    text-align:center;
    padding:20px;
}

.container { max-width:500px; margin:auto; padding:10px; }

/* MENU */
.menu {
    display:flex;
    justify-content:center;
    gap:10px;
}

.menu button {
    background:#ff9800;
    border:none;
    padding:8px 15px;
    border-radius:20px;
    color:white;
    font-weight:bold;
}

/* CARD */
.card {
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    text-align:center;
}

img { width:100%; border-radius:10px; }

/* BUTTON */
.btn {
    background:#28a745;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    width:100%;
    margin-top:10px;
}

/* QTY */
.qty {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

.qty button { padding:5px 12px; }

/* INPUT */
input {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

/* CART */
.cart-item {
    text-align:left;
    margin:5px 0;
}

.remove {
    color:red;
    cursor:pointer;
    float:right;
}

/* SUMMARY */
.summary {
    background:#fff3cd;
    padding:10px;
    border-radius:10px;
    text-align:left;
}

.footer {
    text-align:center;
    background:black;
    color:white;
    padding:15px;
}
</style>

</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Pickles | Sweets | Snacks / Hot items</p>
    <!-- NAVBAR -->
<div style="background:#fff; padding:10px; text-align:center;">
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('about')">About</button>
<button onclick="showTab('contact')">Contact</button>
</div>:
</header>

<div class="container">

<!-- MENU -->
<div class="menu">
<button onclick="showMenu('pickles')">Pickles</button>
<button onclick="showMenu('sweets')">Sweets</button>
<button onclick="showMenu('snacks')">Snacks</button>
</div>

<!-- PRODUCTS -->
<div id="pickles">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<h3>Lemon Pickle</h3>
<h3>Gongura Pickle</h3>
<p>₹600/kg</p>

<div class="qty">
<button onclick="changeQty('p1',-1)">-</button>
<span id="qty_p1">0</span>
<button onclick="changeQty('p1',1)">+</button>

<button class="btn" onclick="addToCart('Mango Pickle',600,'p1')">Add to Cart</button>

    <div id="home">
    <!-- KEEP YOUR EXISTING WEBSITE HERE -->

    <div id="home">

</div>
</div>

<div id="sweets" style="display:none;">
<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('s1',-1)">-</button>
<span id="qty_s1">0</span>
<button onclick="changeQty('s1',1)">+</button>
</div>
</div>

<div id="sweets" style="display:none;">
<div class="card">
<img src="images/sweets.jpg">
<h3>Bellam Gavvaly</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('s1',-1)">-</button>
<span id="qty_s1">0</span>
<button onclick="changeQty('s1',1)">+</button>
</div>
<button class="btn" onclick="addToCart('Laddu',400,'s1')">Add to Cart</button>
</div>
</div>

<div id="snacks" style="display:none;">
<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>

<div class="qty">
<button onclick="changeQty('n1',-1)">-</button>
<span id="qty_n1">0</span>
<button onclick="changeQty('n1',1)">+</button>
</div>

<button class="btn" onclick="addToCart('Murukulu',400,'n1')">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="card">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<p><b>Total: ₹<span id="total">0</span></b></p>
</div>

<!-- ADDRESS -->
<div class="card">
<h3>Delivery Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<button class="btn" onclick="previewOrder()">Preview Order</button>
</div>

<!-- SUMMARY -->
<div class="card" id="summaryBox" style="display:none;">
<h3>Order Summary</h3>
<div id="summary" class="summary"></div>
<button class="btn" onclick="sendOrder()">Confirm Order</button>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Payment</h3>
<a id="upiLink" class="btn">Pay via UPI</a>
</div>

<!-- MAP -->
<div class="card">
<h3>📍 Location</h3>
<iframe src="https://www.google.com/maps?q=17.4064993,78.5987009&output=embed" width="100%" height="200"></iframe>
<a class="btn" href="https://maps.google.com/?q=17.4064993,78.5987009" target="_blank">Open Map</a>
</div>

</div>

<div class="footer">

</div>

<!-- FLOAT WHATSAPP -->
<a href="https://api.whatsapp.com/send?phone=919848305086"
style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;">
💬
</a>

<script>

let cart = [];

/* MENU */
function showMenu(menu){
    document.getElementById("pickles").style.display="none";
    document.getElementById("sweets").style.display="none";
    document.getElementById("snacks").style.display="none";
    document.getElementById(menu).style.display="block";
}

/* QTY */
function changeQty(id,val){
    let el = document.getElementById("qty_"+id);
    let qty = parseInt(el.innerText) + val;
    if(qty<0) qty=0;
    el.innerText = qty;
}

/* ADD */
function addToCart(name, price, id){

    let qty = parseInt(document.getElementById("qty_"+id).innerText);

    if(qty === 0){
        alert("Select quantity");
        return;
    }

    cart.push({name, price, qty});
    displayCart();
}

/* DISPLAY CART */
function displayCart(){
    let div = document.getElementById("cartItems");
    let total = 0;
    div.innerHTML = "";

    cart.forEach((item,index)=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;

        div.innerHTML += `
        <div class="cart-item">
        ${item.name} x ${item.qty} = ₹${itemTotal}
        <span class="remove" onclick="removeItem(${index})">❌</span>
        </div>`;
    });

    document.getElementById("total").innerText = total;
}

/* REMOVE */
function removeItem(i){
    cart.splice(i,1);
    displayCart();
}

/* PREVIEW */
function previewOrder(){

    let name = nameInput();
    let phone = phoneInput();
    let address = addrInput();

    if(!name || !phone || !address){
        alert("Fill all details");
        return;
    }

    if(cart.length === 0){
        alert("Cart empty");
        return;
    }

    let total = 0;
    let summary = "";

    cart.forEach(item=>{
        let itemTotal = item.price * item.qty;
        total += itemTotal;
        summary += `${item.name} x ${item.qty} = ₹${itemTotal}<br>`;
    });

    summary += `<br><b>Total: ₹${total}</b>`;

    document.getElementById("summary").innerHTML = summary;
    document.getElementById("summaryBox").style.display="block";

    document.getElementById("upiLink").href =
    "upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&am="+total+"&cu=INR";
}

/* SEND */
function sendOrder(){

    let msg = "🛒 Order%0A%0A";

    cart.forEach(item=>{
        msg += item.name+" x "+item.qty+" = ₹"+(item.price*item.qty)+"%0A";
    });

    window.open("https://api.whatsapp.com/send?phone=919848305086&text="+msg);

    cart = [];
    displayCart();
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.getElementById("summaryBox").style.display="none";
}

/* HELPERS */
function nameInput(){ return document.getElementById("name").value.trim(); }
function phoneInput(){ return document.getElementById("phone").value.trim(); }
function addrInput(){ return document.getElementById("address").value.trim(); }

    function showTab(tab){

    document.getElementById("home").style.display="none";
    document.getElementById("about").style.display="none";
    document.getElementById("contact").style.display="none";

    document.getElementById(tab).style.display="block";
}
</script>

</body>
</html>
