<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(to right, orange, red);
    color: white;
    padding: 20px;
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* IMAGE */
img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: green;
    color: Yellow;
    padding: 12px;
    border: none;
    border-radius: 5px;
    width: 80%;
    margin-top: 10px;
    cursor: pointer;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* RADIO */
.radio-group {
    display: flex;
    justify-content: space-around;
    margin: 10px 0;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 15px;
    background: black;
    color: white;
    margin-top: 20px;
}
</style>

</head>

<body>

<header>
    <h1>Siri Home Foods</h1>
    <p>Fresh • Healthy • Homemade</p>
</header>

<div class="container">

<!-- ITEMS -->
<h2 style="text-align:center;">Our Special Items</h2>

<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>
</div>

<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>
</div>

<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>
</div>

<!-- ORDER FORM -->
<h2 style="text-align:center;">Place Your Order</h2>

<form class="card" onsubmit="sendToWhatsApp(); return false;">

<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<select id="item">
<option>Mango Pickle</option>
<option>Gongura Pickle</option>
<option>Laddu</option>
<option>Murukulu</option>
</select>

<p><b>Select Quantity:</b></p>

<div class="radio-group">
<label><input type="radio" name="qty" value="1 kg"> 1 kg</label>
<label><input type="radio" name="qty" value="2 kg"> 2 kg</label>
<label><input type="radio" name="qty" value="5 kg"> 5 kg</label>
</div>

<button class="btn" type="submit">Submit Order</button>

</form>

<!-- QUICK ORDER -->
<div class="card">
<h3>Quick Order</h3>
<a class="btn" href="https://wa.me/919848305086">Order on WhatsApp</a>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>Pay Now</h3>
<a class="btn" href="upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&cu=INR">
💰 Pay via UPI
</a>
</div>

<!-- LOCATION -->
<div class="card">
<h3>Location</h3>

<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&output=embed"
width="100%" height="200" style="border:0;">
</iframe>

<a class="btn" href="https://www.google.com/maps/place/Chilukuri+nilayam" target="_blank">
📍 Open in Google Maps
</a>

</div>

</div>

<!-- FOOTER -->
<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/919848305086" 
style="position:fixed; bottom:20px; right:20px; background:green; color:white; padding:15px; border-radius:50%;">
💬
</a>

<!-- SCRIPT -->
<script>
function sendToWhatsApp() {

    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var item = document.getElementById("item").value;

    var qty = document.querySelector('input[name="qty"]:checked');
    if(!qty){
        alert("Please select quantity");
        return;
    }

    var message = "Order Details:%0A"
        + "Name: " + name + "%0A"
        + "Phone: " + phone + "%0A"
        + "Item: " + item + "%0A"
        + "Quantity: " + qty.value;

    var url = "https://wa.me/919848305086?text=" + message;

    window.open(url, "_blank");

    // RESET FORM
    document.querySelector("form").reset();

    alert("Order sent successfully!");
}
</script>

</body>
</html>
