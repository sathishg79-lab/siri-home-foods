<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: linear-gradient(to right, orange, red);
    color: white;
    padding: 20px;
    text-align: center;
}

/* SECTION */
section {
    padding: 20px;
}

/* CARD DESIGN */
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 8px gray;
}

/* IMAGES */
img {
    width: 100%;
    max-width: 250px;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: green;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    display: inline-block;
    margin-top: 10px;
}

/* FORM */
input, select {
    width: 90%;
    max-width: 300px;
    padding: 10px;
    margin: 5px;
}

/* FOOTER */
.footer {
    text-align: center;
    background: black;
    color: white;
    padding: 15px;
}
</style>

</head>

<body>

<header>
    <h1>Siri Home Foods</h1>
    <p>Fresh • Healthy • Homemade</p>
</header>

<section>
<h2 style="text-align:center;">Our Special Items</h2>

<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>
</div>

<div class="card">
<img src="images/sweets.jpg">
<h3>Laddu</h3>
<p>₹400/kg</p>
</div>

<div class="card">
<img src="images/snacks.jpg">
<h3>Murukulu</h3>
<p>₹400/kg</p>
</div>

</section>

<section>
<h2 style="text-align:center;">Place Your Order</h2>

<form onsubmit="sendToWhatsApp(); return false;" class="card">

<input type="text" id="name" placeholder="Your Name" required><br>
<input type="tel" id="phone" placeholder="Phone Number" required><br>

<!-- DROPDOWN -->
<select id="item">
<option>Mango Pickle</option>
<option>Gongura Pickle</option>
<option>Laddu</option>
<option>Murukulu</option>
</select><br>

<!-- RADIO BUTTONS -->
<p><b>Select Quantity:</b></p>

<input type="radio" name="qty" value="1 kg"> 1 kg  
<input type="radio" name="qty" value="2 kg"> 2 kg  
<input type="radio" name="qty" value="5 kg"> 5 kg  

<br><br>

<button class="btn" type="submit">Submit Order</button>

</form>
</section>

<section style="text-align:center;">
<h2>Quick Order</h2>
<a class="btn" href="https://wa.me/919848305086">Order on WhatsApp</a>
</section>

<section style="text-align:center;">
<h2>Pay Now</h2>
<a class="btn" href="upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&cu=INR">
💰 Pay via UPI
</a>
</section>

<section style="text-align:center;">
<h2>Location</h2>

<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&output=embed"
width="300" height="200" style="border:0;">
</iframe><br><br>

<a class="btn" href="https://www.google.com/maps/place/Chilukuri+nilayam" target="_blank">
📍 Open in Google Maps
</a>

</section>

<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/919848305086" 
style="position:fixed; bottom:20px; right:20px; background:green; color:white; padding:15px; border-radius:50%;">
💬
</a>

<script>
function sendToWhatsApp() {

    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var item = document.getElementById("item").value;

    var qty = document.querySelector('input[name="qty"]:checked');
    if(!qty){
        alert("Please select quantity");
        return;
    }

    var message = "Order Details:%0A"
        + "Name: " + name + "%0A"
        + "Phone: " + phone + "%0A"
        + "Item: " + item + "%0A"
        + "Quantity: " + qty.value;

    var url = "https://wa.me/919848305086?text=" + message;

    window.open(url, "_blank");

    // ✅ RESET FORM (IMPORTANT)
    document.querySelector("form").reset();
}
</script>

</body>
</html>
