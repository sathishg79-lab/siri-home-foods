<!DOCTYPE html>
<html>
<head>
<title>Siri Home Foods</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin: 0; background: #f2f2f2; }

header {
    background: linear-gradient(to right, orange, red);
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

/* CATEGORY */
.category-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.category-bar button {
    padding: 8px 15px;
    border: none;
    background: orange;
    color: white;
    border-radius: 20px;
}

/* CARD */
.card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    text-align: center;
}

img {
    width: 100%;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    background: green;
    color: white;
    padding: 10px;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
    cursor: pointer;
}

/* FORM */
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
}

/* CART */
.cart ul { padding-left: 20px; }

/* FOOTER */
.footer {
    text-align: center;
    background: black;
    color: white;
    padding: 15px;
    margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h1>Siri Home Foods</h1>
<p>Fresh • Healthy • Homemade</p>
</header>

<div class="container">

<!-- CATEGORY -->
<div class="category-bar">
<button onclick="showCategory('pickles')">Pickles</button>
<button onclick="showCategory('sweets')">Sweets</button>
<button onclick="showCategory('snacks')">Snacks</button>
</div>

<!-- ITEMS -->
<div id="pickles">
<div class="card">
<img src="images/pickle.jpg">
<h3>Mango Pickle</h3>
<p>₹600/kg</p>
<button class="btn" onclick="addToCart('Mango Pickle',600)">Add to Cart</button>
</div>
</div>

<!-- CART -->
<div class="card cart">
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<p><b>Total: ₹<span id="total">0</span></b></p>

<button class="btn" onclick="sendCart()">Order via WhatsApp</button>
</div>

<!-- ORDER FORM -->
<div class="card">
<h3>Place Order Details</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">

<select id="qty">
<option>1 kg</option>
<option>2 kg</option>
<option>5 kg</option>
</select>

<button class="btn" onclick="sendForm()">Send Order</button>
</div>

<!-- PAYMENT -->
<div class="card">
<h3>💰 Payment</h3>
<a class="btn" href="upi://pay?pa=sathishgandhamalla@ybl&pn=SiriHomeFoods&cu=INR">
Pay via UPI
</a>
</div>

<!-- LOCATION -->
<div class="card">
<h3>📍 Location</h3>

<iframe 
src="https://www.google.com/maps?q=17.4064993,78.5987009&output=embed"
width="100%" height="200" style="border:0;">
</iframe>

<a class="btn" href="https://www.google.com/maps/place/Chilukuri+nilayam" target="_blank">
<a class="btn" href="https://www.google.com/maps/place/Chilukuri+nilayam/@17.406515,78.5965089,367m/data=!3m1!1e3!4m6!3m5!1s0x3bcb9fb80e27c15b:0xc18d38d01e783a8!8m2!3d17.4064993!4d78.5987009!16s%2Fg%2F11lr101wzz?entry=ttu&g_ep=EgoyMDI2MDQwMS4wIKXMDSoASAFQAw%3D%3D">    
Open in Google Maps
</a>
</div>

</div>

<div class="footer">
📞 9848305086 <br>
© Siri Home Foods
</div>

<!-- FLOAT WHATSAPP -->
<a href="https://wa.me/919848305086" 
style="position:fixed; bottom:20px; right:20px; background:green; color:white; padding:15px; border-radius:50%;">
💬
</a>

<script>

let cart = [];

/* ADD CART */
function addToCart(name, price) {
    cart.push({name, price});
    displayCart();
}

/* DISPLAY */
function displayCart() {
    let list = document.getElementById("cartList");
    let total = 0;
    list.innerHTML = "";

    cart.forEach((item, i) => {
        total += item.price;

        list.innerHTML += item.name + " - ₹" + item.price +
        " <button onclick='removeItem("+i+")'>❌</button><br>";
    });

    document.getElementById("total").innerText = total;
}

/* REMOVE */
function removeItem(i) {
    cart.splice(i,1);
    displayCart();
}

/* CART ORDER */
function sendCart() {
    if(cart.length == 0){
        alert("Cart empty");
        return;
    }

    let msg = "Order:%0A";

    cart.forEach(item => {
        msg += item.name + " ₹" + item.price + "%0A";
    });

    window.open("https://wa.me/919848305086?text=" + msg);
}

/* FORM ORDER */
function sendForm() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let qty = document.getElementById("qty").value;

    let msg = "Order Details:%0AName: "+name+"%0APhone: "+phone+"%0AQty: "+qty;

    window.open("https://wa.me/919848305086?text=" + msg);
}

</script>

</body>
</html>
